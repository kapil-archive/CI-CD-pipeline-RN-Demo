name: React Native Android AAB CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:

      # 1пёЏвѓЈ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2пёЏвѓЈ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3пёЏвѓЈ Install dependencies
      - name: Install npm dependencies
        run: npm install

      # 4пёЏвѓЈ Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 5пёЏвѓЈ Cache Gradle
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6пёЏвѓЈ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # 7пёЏвѓЈ Decode keystore
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      # 8пёЏвѓЈ Configure signing
      - name: Configure signing
        run: |
          echo "MYAPP_UPLOAD_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> android/gradle.properties
          echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> android/gradle.properties

      # 9пёЏвѓЈ Verify keystore
      - name: Verify keystore
        run: ls android/app

      # рџ”џ Grant gradlew permission
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # 1пёЏвѓЈ1пёЏвѓЈ Run lint
      - name: Run lint
        run: npm run lint || true

      # 1пёЏвѓЈ2пёЏвѓЈ Run tests
      - name: Run tests
        run: npm test --if-present

      # 1пёЏвѓЈ3пёЏвѓЈ Build Android App Bundle
      - name: Build Android App Bundle
        run: |
          cd android
          ./gradlew bundleRelease
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # 1пёЏвѓЈ4пёЏвѓЈ Upload AAB artifact
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab